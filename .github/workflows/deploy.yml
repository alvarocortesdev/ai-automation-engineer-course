name: Deploy to GitHub Pages

on:
  # Despliega en cada push a main
  push:
    branches: [main]
  # Permite lanzarlo a mano desde la pestaña Actions
  workflow_dispatch:

# Permisos para clonar el repo y publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes; no cancela el que está en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        # node-version y package-manager se autodetectan (Node 24 + pnpm vía lockfile)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
