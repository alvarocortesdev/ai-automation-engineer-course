# .ai contract v1 — un ejercicio
id: fase-3/migracion-reversible
titulo: "Escribe una migración reversible con backfill"
fase: fase-3
sub_unidad: "3.4"
ruta_critica: true
modalidad: codigo
objetivos:
  - "Implementar una migración que cambie esquema y datos a la vez: agregar columnas y rellenarlas (backfill) desde una columna existente"
