# .ai contract v1 — un ejercicio
id: fase-3/disenar-esquema-reservas
titulo: "Diseña un esquema desde requisitos: reservas de coworking"
fase: fase-3
sub_unidad: "3.1"
ruta_critica: true
modalidad: mixto
