# .ai contract v1 — un ejercicio
id: fase-3/disenar-pago-idempotente
titulo: "Diseña un endpoint POST idempotente"
fase: fase-3
sub_unidad: "3.14"
ruta_critica: true
modalidad: mixto
objetivos:
  - "Diseñar el esquema de una tabla de idempotency keys con un constraint que arbitre la carrera concurrente"
