# .ai contract v1 — un ejercicio
id: fase-0/git-modelo-mental
titulo: "Predice las referencias (modelo mental de Git)"
fase: fase-0
sub_unidad: "0.6"
ruta_critica: true
modalidad: a-mano
objetivos:
  - "Predecir, sin ejecutar Git, a qué commit apunta cada referencia (main, rama, HEAD) tras una secuencia que ramifica y diverge"
  - "Justificar si un merge resultará fast-forward o de 3 vías, y dibujar el grafo resultante"
  - "Explicar qué reescribe un rebase (hash nuevo, mismo cambio) y enunciar la regla de oro del rebase"
hilos_transversales: []
primero_sin_ia:
  novedad: nuevo
  timebox_min: 30
definition_of_done: []
paths:
  tests: null   # ejercicio a-mano: la verificación la hace el alumno ejecutando Git, no hay suite
