# .ai contract v1 — un ejercicio
id: fase-4/jerarquia-y-contraste-tarjeta
titulo: "Rediseña una tarjeta de IA: jerarquía, escala y contraste AA"
fase: fase-4
sub_unidad: "4.3"
ruta_critica: true
modalidad: mixto
objetivos:
  - "Rediseñar un componente con jerarquía visual (tamaño + peso + contraste): tres niveles distinguibles con el squint test"
