# .ai contract v1 — un ejercicio
id: fase-2/solid-juicio-sobre-abstraccion
titulo: "El juicio: ¿abstraer o no?"
fase: fase-2
sub_unidad: "2.4"
ruta_critica: true
modalidad: a-mano
