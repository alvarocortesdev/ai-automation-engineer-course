# .ai contract v1 — un ejercicio
id: fase-6/diseno-multiagente-hitl
titulo: "Diseño: sistema agéntico con patrón, framework y HITL"
fase: fase-6
sub_unidad: "6.8"
ruta_critica: true
modalidad: a-mano                    # diseño/razonamiento: entregable es diseno.md, sin tests
