  - "Elegir patrón (single/orchestrator-worker/supervisor/handoffs) por la restriccion dominante"
  - "Elegir framework por restriccion y nombrar que se pierde con esa eleccion"
  - "Ubicar HITL en acciones irreversibles y definir un techo de costo"
  - "Distinguir memoria de corto y largo plazo; nombrar 3 riesgos OWASP LLM/Agentic con mitigacion"
hilos_transversales: [seguridad, costo-latencia, observabilidad, spec-driven]
primero_sin_ia:
