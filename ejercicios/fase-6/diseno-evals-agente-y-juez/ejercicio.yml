# .ai contract v1 — un ejercicio
id: fase-6/diseno-evals-agente-y-juez
titulo: "Diseño: plan de evals para un agente + un juez calibrado"
fase: fase-6
sub_unidad: "6.9"
ruta_critica: true
modalidad: a-mano                    # diseño/razonamiento: entregable es diseno.md, sin tests
objetivos:
  - "Elegir métricas de agente (tool-call accuracy, trajectory, task completion, costo/pasos) y clasificar cada una como determinista o con-juez"
  - "Construir el golden set desde trazas de prod, justificando qué casos se promueven"
  - "Diseñar un LLM-as-judge con rúbrica y mitigar position/verbosity/self-enhancement bias; validarlo contra labels humanos"
  - "Definir gate de regresión + budget de costo/pasos en CI y la trazabilidad score<->prompt+modelo+dataset (Langfuse)"
hilos_transversales: [evals, observabilidad, costo-latencia, seguridad, spec-driven]
primero_sin_ia:
  novedad: nuevo                     # métricas cubiertas en worked example -> diseño propio
  timebox_min: 40
definition_of_done: []               # ejercicio atómico, no capstone
paths:
  tests: null                        # ejercicio de diseño: la verificación la hace el corrector
