# .ai contract v1 — un ejercicio
id: fase-6/break-even-local-vs-api
titulo: "Calculadora del punto de equilibrio local vs API"
fase: fase-6
sub_unidad: "6.10"
ruta_critica: true
modalidad: mixto                     # a-mano (predicción del equilibrio) + codigo (funciones puras)
