  - "Calcular el costo por request y el costo mensual de una API a partir de tokens y pricing por millón"
  - "Calcular el punto de equilibrio en requests donde servir local (costo fijo) iguala a la API (costo variable)"
  - "Explicar por qué a volumen bajo o variable la API casi siempre gana por costo"
hilos_transversales: [costo-latencia, testing]
primero_sin_ia:
  novedad: nuevo                     # concepto nuevo: worked example -> faded -> Primero-Sin-IA
  timebox_min: 40
