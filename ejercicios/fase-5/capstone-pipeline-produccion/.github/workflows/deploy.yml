# Esqueleto de DEPLOY — corre en push a main, DESPUÉS de que el CI pasó. Complétalo (lección §4 paso 7).
#
# Principios:
#   - Despliega la MISMA imagen que se testeó (referenciada por digest/tag inmutable, no :latest).
#   - Secretos vía `secrets.` de GitHub Actions, inyectados en runtime. NUNCA en el repo.
#   - Documenta el rollback en docs/RUNBOOK.md (este workflow debería permitir volver a la imagen anterior).
#   - Pinea las actions a SHA y usa permissions mínimos.

name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Usa un GitHub Environment para gatear/auditar el deploy a prod (5.3).
    environment: production
    permissions:
      contents: read
      # packages: write   # solo si publicas la imagen a GHCR
