# Esqueleto de CI — gate de PR. Complétalo (lección §4 pasos 4-5, §6 capa 3).
# REGLAS de seguridad (5.4): permissions mínimos, actions pinneadas a SHA, cada gate FALLA el build.
#
# Pinea cada `uses:` a un commit SHA (NO a @v4 ni @main) con un comentario # vX.Y.Z legible.
# Ejemplos de SHAs reales (verifica/actualiza con Dependabot):
#   actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8   # v5.0.0
#   astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v8
#   aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.28

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Default mínimo a nivel de workflow. Súbelo SOLO en el job que de verdad lo necesite.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
