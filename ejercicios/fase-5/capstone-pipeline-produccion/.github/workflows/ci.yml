      - run: "echo 'TODO: lint + test' && exit 1"

  sca:
    # SCA / dependency scanning: falla si una dependencia tiene un CVE conocido.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # TODO: checkout + escaneo de dependencias (p. ej. uvx pip-audit --strict, o npm audit).
      - run: "echo 'TODO: SCA' && exit 1"

  secret-scan:
    # Secret-scanning: por si se escapó una credencial al historial.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # TODO: checkout (con fetch-depth: 0 para escanear historial) + gitleaks (a SHA).
      - run: "echo 'TODO: secret-scan' && exit 1"

  build-and-scan-image:
    # Construye la imagen y la escanea (Trivy). Genera el SBOM.
    runs-on: ubuntu-latest
    needs: [lint-test]
    permissions:
      contents: read
    steps:
